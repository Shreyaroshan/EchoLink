services:
  - type: web
    name: echolink-app
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: echolink-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        fromDatabase:
          name: echolink-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: echolink-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: echolink-db
          property: password

databases:
  - name: echolink-db
    plan: free
